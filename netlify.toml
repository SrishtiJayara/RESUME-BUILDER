[build]
  command = "cd frontend && npm install && npm run build"
  functions = "netlify/functions"
  publish = "frontend/build"

[dev]
  command = "cd frontend && npm run dev"
  functions = "netlify/functions"
  port = 3000

[functions.api]
  node_bundler = "esbuild"
  timeout = 30

[functions.groq]
  node_bundler = "esbuild"
  timeout = 60

# Route API calls to functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/groq/*"
  to = "/.netlify/functions/groq:splat"
  status = 200

# Single Page App - redirect all requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
